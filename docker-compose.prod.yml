name: hermestoken-prod

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEB_DIST_STRATEGY: ${WEB_DIST_STRATEGY:-prebuilt}
        APP_VERSION: ${APP_VERSION:-}
    image: hermestoken-prod:latest
    container_name: hermestoken-prod
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    volumes:
      - ${APP_DATA_DIR:-./data-prod}:/data
      - ${APP_LOG_DIR:-./logs-prod}:/app/logs
    environment:
      SQL_DSN: "postgresql://root:${POSTGRES_PASSWORD:?set in .env.production}@postgres:5432/new-api?sslmode=disable"
      REDIS_CONN_STRING: "redis://redis"
      TZ: "${TZ:-Asia/Shanghai}"
      SESSION_SECRET: "${SESSION_SECRET:?set in .env.production}"
      MARKETPLACE_CREDENTIAL_SECRET: "${MARKETPLACE_CREDENTIAL_SECRET:?set in .env.production}"
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      TRUSTED_REDIRECT_DOMAINS: "${TRUSTED_REDIRECT_DOMAINS:-}"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - hermestoken-prod-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    pull_policy: if_not_present
    container_name: hermestoken-prod-redis
    restart: unless-stopped
    networks:
      - hermestoken-prod-network

  postgres:
    image: postgres:latest
    pull_policy: if_not_present
    container_name: hermestoken-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set in .env.production}"
      POSTGRES_DB: new-api
    volumes:
      - pg_data_prod:/var/lib/postgresql
    networks:
      - hermestoken-prod-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d new-api" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data_prod:
    external: true
    name: hermestoken_pg_data_prod


networks:
  hermestoken-prod-network:
    driver: bridge
