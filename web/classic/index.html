<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      lang="zh"
      content="HermesToken 是一个独立的自托管 AI 模型网关，将多种大语言模型统一为标准化 API 接口，提供集中式的密钥管理、分发与计费。本服务为独立产品，与各 AI 模型厂商无隶属、合作或授权关系。"
    />
    <meta
      name="description"
      lang="en"
      content="HermesToken is an independent, self-hostable AI model gateway that unifies multiple large language models behind a standardized API for centralized key management, distribution, and billing. It is an independent product and is not affiliated with, partnered with, or endorsed by any AI model provider."
    />
    <meta name="generator" content="hermestoken" />
    <title>HERMESTOKEN</title>
    <script>
      (() => {
        const fallbackPrefs = { themeMode: 'auto', language: 'zh-CN' };
        const rootElement = document.documentElement;
        const shouldUseDarkTheme = (themeMode) => {
          const prefersDark = Boolean(
            window.matchMedia?.('(prefers-color-scheme: dark)').matches,
          );

          return themeMode === 'dark' || (themeMode === 'auto' && prefersDark);
        };

        try {
          const themeMode =
            window.localStorage.getItem('theme-mode') || fallbackPrefs.themeMode;
          const language =
            window.localStorage.getItem('i18nextLng') || fallbackPrefs.language;

          window.__HERMES_CLIENT_PREFS__ = { themeMode, language };

          if (shouldUseDarkTheme(themeMode)) {
            rootElement.classList.add('dark');
          } else {
            rootElement.classList.remove('dark');
          }
        } catch {
          window.__HERMES_CLIENT_PREFS__ = fallbackPrefs;
          if (shouldUseDarkTheme(fallbackPrefs.themeMode)) {
            rootElement.classList.add('dark');
          } else {
            rootElement.classList.remove('dark');
          }
        }
      })();
    </script>

  </body>
