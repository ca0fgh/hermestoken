    }

    location = /index.html {
        root /opt/hermestoken/web/dist;
        etag on;
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location / {
        root /opt/hermestoken/web/dist;
        index index.html;
        etag on;
        try_files $uri $uri/ /index.html;
    }
}
